server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Backend API routes (see backend/src/app.ts for the full prefix list).
    # Proxying them here keeps frontend and backend on the same origin,
    # so no CORS setup or cross-site cookies are needed in production.
    location ~ ^/(auth|dish|reservation|news|faq|contact-request|user|upload|character|achievement|admin|payments|uploads)(/|$) {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri /index.html;
    }
}
