services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-baldgoose}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-baldgoose}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      TZ: Asia/Yekaterinburg
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "/api"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  uploads:
